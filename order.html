<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <div class="max-w-2xl mx-auto mt-16 bg-white rounded-xl shadow p-6">
    <h2 class="text-2xl font-bold mb-4">Checkout</h2>

    <p id="itemName" class="text-lg"></p>
    <p id="itemPrice" class="text-lg mb-4"></p>

    <input id="name" type="text" placeholder="Your Name" class="w-full p-3 border rounded mb-3">
    <input id="phone" type="text" placeholder="Phone Number" class="w-full p-3 border rounded mb-3">
    <input id="address" type="text" placeholder="Delivery Address" class="w-full p-3 border rounded mb-3">

    <button id="payBtn"
            class="bg-orange-600 text-white px-6 py-3 rounded hover:bg-orange-700 transition w-full">
      Pay Now
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const item = params.get('item');
    const price = params.get('price');

    document.getElementById('itemName').innerText = "Item: " + item;
    document.getElementById('itemPrice').innerText = "Price: " + price + " Tk";

    document.getElementById('payBtn').addEventListener('click', () => {
      alert("Payment Successful! Thank you for your order.");
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
